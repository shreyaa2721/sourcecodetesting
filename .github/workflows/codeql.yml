name: "CodeQL"
 
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '30 2 * * 1'
 
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
 
    permissions:
      actions: read
      contents: read
      security-events: write
 
    strategy:
      fail-fast: false
      matrix:
        language: [java]
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
 
        - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
 
      - name: Build WebGoat
        run: |
          cd sample-repos/WebGoat
          mvn clean package -DskipTests
 
      - uses: github/codeql-action/analyze@v3
